spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/notification_hub
    username: ${POSTGRES_USER:app_user}
    password: ${POSTGRES_PASSWORD:app_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        connection.isolation: 2
        cache.use_second_level_cache: false
        cache.use_query_cache: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
  default-chat-id: ${TELEGRAM_CHAT_ID}

discord:
  webhook:
    url: ${DISCORD_WEBHOOK_URL}

admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    com.notificationhub: DEBUG

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health
