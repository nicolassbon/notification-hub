services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: notification-hub-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-config/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - notification-hub-network

  app:
    build:
      context: ./
      dockerfile: Dockerfile
      network: host
    container_name: notification-hub-app
    ports:
      - '8080:8080'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      SPRING_ACTIVE_PROFILE: prod
    networks:
      - notification-hub-network

networks:
  notification-hub-network:
    driver: bridge

volumes:
  postgres_data: